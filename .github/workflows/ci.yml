name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Required for Next.js build (dummy values for CI — no real DB calls)
      NEXT_PUBLIC_SUPABASE_URL: https://mock-project.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: mock-anon-key
      SUPABASE_SERVICE_ROLE_KEY: mock-service-role-key
      GEMINI_API_KEY: mock-gemini-key
      # Suppress the Serwist Turbopack dev warning in CI
      SERWIST_SUPPRESS_TURBOPACK_WARNING: 1

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit Tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Security Audit
        run: npm audit --audit-level=high
        continue-on-error: true
